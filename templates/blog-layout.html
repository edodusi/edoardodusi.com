<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}} — Edoardo Dusi</title>
  <meta name="description" content="{{excerpt}}" />
  <link rel="canonical" href="{{url}}" />
  
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{title}}" />
  <meta property="og:description" content="{{excerpt}}" />
  <meta name="theme-color" content="#faf9f7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#121314" media="(prefers-color-scheme: dark)" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f766e'/%3E%3Ctext x='50' y='68' font-size='52' font-family='Georgia,serif' font-style='italic' fill='white' text-anchor='middle'%3Ee%3C/text%3E%3C/svg%3E" />

  <script>
    (function () {
      var stored = new URLSearchParams(location.search).get('theme') || localStorage.getItem('theme');
      var dark = stored ? stored === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
    })();
  </script>
  <link rel="stylesheet" href="/main.css?v2" />
  <link rel="stylesheet" href="/syntax.css" />
  
  <style>
    /* Minimal Markdown styling */
    .blog-content h2 { font-size: 1.5rem; margin: 2.5rem 0 1rem; letter-spacing: -0.01em; }
    .blog-content h3 { font-size: 1.25rem; margin: 2rem 0 1rem; }
    .blog-content p { margin-bottom: 1.5rem; }
    .blog-content a { color: var(--accent); text-decoration: underline; text-decoration-color: var(--faint); text-underline-offset: 3px; }
    .blog-content a:hover { text-decoration-color: var(--accent); }
    .blog-content code { background: var(--line); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .blog-content pre { margin-bottom: 1.5rem; border-radius: 8px; overflow: hidden; background: #282936; }
    .blog-content pre code { padding: 1.25rem; display: block; overflow-x: auto; font-size: 0.9em; line-height: 1.5; background: transparent; }
    .blog-content ul, .blog-content ol { margin-bottom: 1.5rem; padding-left: 1.5rem; }
    .blog-content li { margin-bottom: 0.5rem; }
    .blog-content blockquote { border-left: 3px solid var(--accent); padding-left: 1.25rem; font-style: italic; color: var(--muted); margin-bottom: 1.5rem; }
    .blog-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 2rem 0; }
  </style>
</head>
<body>
  <header class="site-head">
    <nav class="site-nav" aria-label="Sections">
      <a class="brand" href="/">edo</a>
      <div id="nav-links" class="nav-links">
        <a href="/#work">Work</a>
        <a href="/#podcast">Podcast</a>
        <a href="/#speaking">Speaking</a>
        <a href="/#writing">Writing</a>
        <a href="/#guests">Guest</a>
        <a href="/#projects">Side</a>
      </div>
      <button id="nav-toggle" class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="nav-links">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <line class="bar bar-1" x1="4" y1="6" x2="20" y2="6"/>
          <line class="bar bar-2" x1="4" y1="12" x2="20" y2="12"/>
          <line class="bar bar-3" x1="4" y1="18" x2="20" y2="18"/>
        </svg>
      </button>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch color theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>
        </svg>
      </button>
    </nav>
  </header>

  <main id="top">
    <section class="hero reveal">
      <p class="kicker"><a href="/blog/" style="text-decoration: none; color: inherit;">← Back to Blog</a></p>
      <h1>{{title}}</h1>
      <p class="tagline">{{date}}</p>
    </section>

    <section class="section reveal blog-content" style="border-top: none; padding-top: 0;">
      {{content}}
    </section>
  </main>

  <footer class="site-foot">
    <div class="foot-row">
      <p>&copy; <span id="year">2026</span> Edoardo Dusi. No rights reserved.</p>
      <a id="contact-link" data-u="hello" data-d="edoardodusi.com" href="#">Get in touch</a>
    </div>
  </footer>

  <script src="/main.js?v2" defer></script>
</body>
</html>
